#file: noinspection YAMLSchemaValidation,SpellCheckingInspection
spring:
  application:
    name: ms-audit
  docker:
    compose:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ms_audit}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    schemas: public
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUERURI:http://localhost:9000}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAPSERVERS:localhost:9094}
    consumer:
      group-id: ms-audit
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

audit:
  kafka:
    topics:
      flag-events: flag.events
      user-invited: user.invited
      token-revoked: token.revoked

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlator}] %-5level %logger{0} - %msg%n"
  level:
    io.github.cassio: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    version: "@project.version@"

server:
  port: 8084
  servlet:
    context-path: /audit/v1
